services:
  db:
    image: postgres:15
    container_name: coffee_db
    environment:
      POSTGRES_DB: coffee_db
      POSTGRES_USER: coffee_user
      POSTGRES_PASSWORD: coffee_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coffee_user -d coffee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: coffee_web
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_NAME=coffee_db
      - DB_USER=coffee_user
      - DB_PASSWORD=coffee_pass

volumes:
  postgres_data: